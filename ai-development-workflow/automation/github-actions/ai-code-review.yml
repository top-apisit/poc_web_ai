# AI Code Review Workflow
# Copy this to: .github/workflows/ai-code-review.yml

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================
  # DETERMINE RISK LEVEL
  # ============================================
  analyze-risk:
    name: Analyze Risk Level
    runs-on: ubuntu-latest
    outputs:
      risk_level: ${{ steps.risk.outputs.level }}
      changed_files: ${{ steps.files.outputs.files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Determine risk level
        id: risk
        run: |
          FILES="${{ steps.files.outputs.files }}"

          # Critical: infrastructure, workflows, security
          if echo "$FILES" | grep -qE "(infrastructure/|\.github/workflows/|terraform/|pulumi/)"; then
            echo "level=critical" >> $GITHUB_OUTPUT
            exit 0
          fi

          # High: auth, payments, security-related code
          if echo "$FILES" | grep -qE "(auth/|payment/|security/|crypto/|\.env)"; then
            echo "level=high" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Medium: source code
          if echo "$FILES" | grep -qE "^src/"; then
            echo "level=medium" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Low: docs, tests, config
          echo "level=low" >> $GITHUB_OUTPUT

  # ============================================
  # AI SECURITY REVIEW (High/Critical)
  # ============================================
  security-review:
    name: AI Security Review
    runs-on: ubuntu-latest
    needs: analyze-risk
    if: needs.analyze-risk.outputs.risk_level == 'high' || needs.analyze-risk.outputs.risk_level == 'critical'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > changes.diff
          echo "diff_file=changes.diff" >> $GITHUB_OUTPUT

      - name: AI Security Review
        id: security
        uses: anthropic/claude-action@v1
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            You are a security expert reviewing code changes for vulnerabilities.

            Analyze this diff for:
            1. Authentication/Authorization issues
            2. Injection vulnerabilities (SQL, NoSQL, Command, XSS)
            3. Sensitive data exposure
            4. Insecure cryptography
            5. Security misconfigurations
            6. Hardcoded secrets or credentials

            For each issue found:
            - File and line number
            - Severity (Critical/High/Medium/Low)
            - Description
            - Recommended fix

            If no issues found, state "No security issues detected."

            Diff content:
            $(cat ${{ steps.diff.outputs.diff_file }})

      - name: Post security review
        uses: actions/github-script@v7
        with:
          script: |
            const review = `## 🔒 AI Security Review

            **Risk Level:** ${{ needs.analyze-risk.outputs.risk_level }}

            ${{ steps.security.outputs.result }}

            ---
            *Automated security review by Claude*`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: review
            });

  # ============================================
  # AI CODE REVIEW
  # ============================================
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: analyze-risk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > changes.diff

      - name: AI Code Review
        id: review
        uses: anthropic/claude-action@v1
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            You are a senior software engineer reviewing a pull request.

            Review this code diff for:
            1. Logic errors or bugs
            2. Performance issues
            3. Code style and consistency
            4. Error handling
            5. Test coverage gaps
            6. Documentation needs

            Provide:
            - Summary of changes
            - Issues found (with file/line references)
            - Suggestions for improvement
            - Overall assessment (Approve/Request Changes/Comment)

            Be constructive and specific. Focus on issues that matter.

            Diff:
            $(cat changes.diff)

      - name: Post code review
        uses: actions/github-script@v7
        with:
          script: |
            const review = `## 🤖 AI Code Review

            **Risk Level:** ${{ needs.analyze-risk.outputs.risk_level }}
            **Files Changed:** ${{ needs.analyze-risk.outputs.changed_files }}

            ${{ steps.review.outputs.result }}

            ---
            *Automated code review by Claude*`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: review
            });

  # ============================================
  # BLOCK CRITICAL CHANGES
  # ============================================
  block-critical:
    name: Critical Review Gate
    runs-on: ubuntu-latest
    needs: [analyze-risk, security-review]
    if: needs.analyze-risk.outputs.risk_level == 'critical'
    steps:
      - name: Request manual review
        uses: actions/github-script@v7
        with:
          script: |
            // Request reviews from security and tech lead
            github.rest.pulls.requestReviewers({
              ...context.repo,
              pull_number: context.issue.number,
              reviewers: ['security-team', 'tech-lead']
            });

            // Add label
            github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels: ['critical-review-required']
            });

            // Comment
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Critical changes detected.** This PR requires manual review from @security-team and @tech-lead before merging.'
            });
